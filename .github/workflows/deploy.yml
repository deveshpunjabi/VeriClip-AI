name: VeriClip AI Deploy

on:
  workflow_run:
    workflows: ["VeriClip AI CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker

      - name: Build and push Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/vericlip-api:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/vericlip-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy vericlip-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/vericlip-api:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --min-instances 2 \
            --max-instances 10 \
            --memory 512Mi \
            --timeout 30s

      - name: Verify deployment
        run: |
          curl -f https://vericlip-api-${{ secrets.GCP_REGION }}.a.run.app/api/v1/health || exit 1

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'

      - name: Get dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build web
        run: flutter build web
        working-directory: frontend

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}

  notify:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify deployment status
        run: |
          echo "Backend: ${{ needs.deploy-backend.result }}"
          echo "Frontend: ${{ needs.deploy-frontend.result }}"
